name: Deploy to Production (cPanel)

on:
  push:
    branches:
      - main   # Auto-deploys on every push to main

jobs:
  build-and-deploy:
    name: Build Frontend and Deploy to cPanel
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Node.js to build frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Build React Frontend
      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # 4. Deploy Frontend build to poe.headwaycollege.ac.ke
      - name: Copy Frontend to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          source: "frontend/dist/*"
          target: "~/poe.headwaycollege.ac.ke"
          strip_components: 2

      # 5. Deploy Backend changes to poe_backend
      - name: Copy Backend to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          source: "backend/*"
          target: "~/poe_backend"
          strip_components: 1

      # 6. Run migrations & Restart Python App via SSH
      - name: Run Migrations and Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Backend: Running migrations ==="
            cd ~/poe_backend
            # Activate virtualenv (adjust path if needed, e.g. ~/virtualenv/poe_backend/3.10/bin/activate)
            source ~/virtualenv/poe_backend/*/bin/activate || source venv/bin/activate || true
            pip install -r requirements.txt --quiet
            python manage.py migrate --no-input
            python manage.py collectstatic --no-input
            
            echo "=== Restarting Python Application ==="
            # Touching passenger_wsgi.py restarts the app on cPanel
            touch passenger_wsgi.py || touch ~/poe_backend/tmp/restart.txt
            
            echo "✅ Deployment complete!"
